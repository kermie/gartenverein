{% extends "base.html" %}
{% block title %}Vereinsrolle bearbeiten{% endblock %}
{% block page_title %}Vereinsrolle bearbeiten{% endblock %}

{% block topbar_actions %}
<a href="/pflichtstunden/vereinsrollen" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Zurück
</a>
{% endblock %}

{% block content %}
<div class="row g-3" style="max-width: 560px;">
    <div class="col-12">
        <div class="card">
            <div class="card-header"><i class="bi bi-pencil me-2"></i>Vereinsrolle bearbeiten</div>
            <div class="card-body">
                <form method="post" action="/pflichtstunden/vereinsrollen/{{ rolle.id }}/bearbeiten">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Bezeichnung <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control"
                               value="{{ rolle.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Beschreibung</label>
                        <textarea name="beschreibung" class="form-control" rows="2">{{ rolle.beschreibung or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   name="pflichtstunden_befreit" id="befreit-check"
                                   {% if rolle.pflichtstunden_befreit %}checked{% endif %}
                                   onchange="document.getElementById('befreiungsgrund-row').style.display = this.checked ? '' : 'none'">
                            <label class="form-check-label" for="befreit-check">
                                Von Pflichtstunden befreit
                            </label>
                        </div>
                    </div>
                    <div class="mb-3" id="befreiungsgrund-row"
                         style="{% if not rolle.pflichtstunden_befreit %}display: none;{% endif %}">
                        <label class="form-label fw-semibold">Befreiungsgrund</label>
                        <select name="befreiungsgrund" class="form-select">
                            <option value="">– bitte wählen –</option>
                            <option value="VORSTAND" {% if rolle.befreiungsgrund and rolle.befreiungsgrund.value == 'VORSTAND' %}selected{% endif %}>Vorstandsarbeit</option>
                            <option value="ERWEITERTER_VORSTAND" {% if rolle.befreiungsgrund and rolle.befreiungsgrund.value == 'ERWEITERTER_VORSTAND' %}selected{% endif %}>Erweiterter Vorstand</option>
                            <option value="KRANKHEIT" {% if rolle.befreiungsgrund and rolle.befreiungsgrund.value == 'KRANKHEIT' %}selected{% endif %}>Krankheit / gesundheitliche Gründe</option>
                            <option value="ALTER" {% if rolle.befreiungsgrund and rolle.befreiungsgrund.value == 'ALTER' %}selected{% endif %}>Altersbefreiung</option>
                            <option value="SONSTIG" {% if rolle.befreiungsgrund and rolle.befreiungsgrund.value == 'SONSTIG' %}selected{% endif %}>Sonstiger Grund</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="/pflichtstunden/vereinsrollen" class="btn btn-outline-secondary">Abbrechen</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Änderungen speichern
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
