services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gartenverein}
      POSTGRES_USER: ${POSTGRES_USER:-gartenverein}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gartenverein}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Wegwerf-Datenbank für automatisierte Tests. Läuft nur, wenn explizit mit
  # --profile test gestartet (nicht bei normalem "docker compose up").
  # tmpfs statt Volume: Daten verschwinden beim Stoppen, jeder Testlauf
  # startet garantiert mit einer leeren Datenbank.
  db_test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: gartenverein_test
      POSTGRES_USER: gartenverein
      POSTGRES_PASSWORD: test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gartenverein"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gartenverein}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-gartenverein}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@gartenverein.local}
      SMTP_TLS: ${SMTP_TLS:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
      - ./requirements-dev.txt:/app/requirements-dev.txt
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
