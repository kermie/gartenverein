name: Tests

# Läuft automatisch bei jedem Push und jedem Pull Request – so wird jede
# Änderung gegen die bestehende Test-Suite geprüft, bevor sie in main landet.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Echtes PostgreSQL statt SQLite, bewusst identisch zur Produktion.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gartenverein_test
          POSTGRES_USER: gartenverein
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gartenverein"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Tests ausführen
        env:
          DATABASE_URL: postgresql+asyncpg://gartenverein:test@localhost:5432/gartenverein_test
          SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: development
        run: python -m pytest -v
